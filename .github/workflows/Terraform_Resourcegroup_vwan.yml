          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_LZ_Applications-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_LZ_Applications-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-metastore-shared-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-metastore-shared-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-mssql-prd-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-mssql-prd-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-mssql-acc-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-mssql-acc-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-linux-beheer-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-linux-beheer-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-informatiehuishouding-prd-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-informatiehuishouding-prd-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-moveit-gateway-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-moveit-gateway-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_PF_Management-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_PF_Management-link'
          
      - name: Terraform Format
        run: terraform fmt -check

      # Validate
      - name: Terraform Validate
        run: terraform validate -no-color

      # TFLint
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint -f compact --minimum-failure-severity=error


      # tfsec (security scan)
      - name: Run tfsec
        shell: bash
        run: |
          tfsec . || true



      # Saved plan (voor apply zonder re-plan)
      - name: Terraform Plan
        id: tf-plan
        if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan | tee plan_output.log
          terraform show -json tfplan > tfplan.json

      - name: Prevent Destroy (Scheduled Runs Only)
        if: github.event_name == 'schedule'
        run: |
          if jq -e '.resource_changes[] | select(.change.actions[] == "delete" or .change.actions[] == "destroy")' tfplan.json > /dev/null; then
            echo "Destroy operation detected."
            exit 1
          else
            echo "No destroy operations detected."
          fi

      # Upload artifacts zodat apply job exact dit plan kan gebruiken
      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            tfplan
            plan_output.log
            tfplan.json

  apply:
    name: Terraform Apply (requires approval)
    runs-on: ${{ inputs.GH_RUNNER_POOL }}
    needs: plan
    environment: production

    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule')
    env:
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true
          enable-AzPSSession: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.AZURE_BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ inputs.AZURE_BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ inputs.AZURE_BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ inputs.AZURE_BACKEND_STATE_FILE }}" \
            -backend-config="use_azuread_auth=true"

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}

      - name: Terraform Apply (uses saved plan)
        run: |
          terraform apply -auto-approve -input=false tfplan
