          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-aro-lcm-prd-001-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-aro-lcm-prd-001-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-aro-hip-sbx-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-aro-hip-sbx-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-aro-mgmt-prd-link"]' \
