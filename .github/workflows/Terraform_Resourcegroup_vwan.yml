          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-vsp-danny-poc-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-vsp-danny-poc-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_Terraform_test-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_Terraform_test-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-lz-applications-north-europe-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-lz-applications-north-europe-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_LZ_Org_Applicaties_P-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_LZ_Org_Applicaties_P-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_LZ_ARC-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_LZ_ARC-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_LZ_KeyVaults-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_LZ_KeyVaults-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["VNET_Rdam_PF_Identity-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/VNET_Rdam_PF_Identity-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-shared-resources-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-shared-resources-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-backup-prd-001-link"]' \
          '/subscriptions/3d8dac72-0f68-451f-9748-3cd509dced16/resourceGroups/rg-rdam-connectivity-prd-weu-01-hub/providers/Microsoft.Network/virtualHubs/vhub-rdam-connectivity-prd-weu-01/hubVirtualNetworkConnections/vnet-rdam-backup-prd-001-link'

          terraform import 'azurerm_virtual_hub_connection.vnet_connections["vnet-rdam-devcenter-prd-link"]' \
